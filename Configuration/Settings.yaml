CodeQ:
  Meilisearch:
    QueueIndexer:
      # When true, publishing a node enqueues a job instead of writing to Meilisearch
      # synchronously. Set to false to fall back to the upstream sync indexer.
      enableLiveAsyncIndexing: true

Flowpack:
  JobQueue:
    Common:
      queues:
        'CodeQ.Meilisearch.QueueIndexer.Live':
          preset: 'CodeQ.Meilisearch.QueueIndexer.Live'

      presets:
        'CodeQ.Meilisearch.QueueIndexer.Live':
          className: 'Flowpack\JobQueue\Doctrine\Queue\DoctrineQueue'
          options:
            tableName: 'codeq_meilisearch_queueindexer_live'
